<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis de Homicidios</title>
  <link rel="stylesheet" href="homicidios.css" />
  <link rel="stylesheet" href="portada.css" />
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="portada-wrapper">

  <main class="hero">

    

    <h1 class="main-title">
      <span class="word-1">ESTADÍSTICAS DE</span>
      <span class="word-2">HOMICIDIOS EN </span>
      <span class="word-3">ECUADOR </span>
    </h1>

    

    <div class="data-divider">
      <hr />
      <div class="data-pill">
        <div class="data-stat">
          <div class="num">2014 (Enero)</div>
          <div class="lbl">Inicio</div>
        </div>
        <div class="data-dot"></div>
        <div class="data-stat">
          <div class="num">2026 (Abril)</div>
          <div class="lbl">Cierre</div>
        </div>
      </div>
      <hr />
    </div>

    <div class="team-section">
      <span class="team-label">Equipo</span>
      <div class="team-cards">
        <div class="member-card">          
          <div class="member-name">Francisco Rodríguez</div>
        </div>
        <div class="member-card">          
          <div class="member-name">Diego Chicaiza</div>
        </div>
      </div>
    </div>

    <div class="cta-wrapper">
      <a href="homicidios.html" class="cta-btn">
        Ver análisis completo
        <span class="cta-arrow">→</span>
      </a>
    </div>

  </main>
  <footer class="eyebrow">
      <span class="eyebrow-line"></span>
      <span>----- Ecuador · 2026 -----</span>
      <span class="eyebrow-line"></span>
  </footer>

  

</div>

<div class="corner-ornament">
  <span style="width:60px"></span>
  <span style="width:40px"></span>
  <span style="width:24px"></span>
</div>

<script src="index.js" defer></script>

</body>
</html>
